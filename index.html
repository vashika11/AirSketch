<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSketch</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Segoe UI',Tahoma,Geneva,sans-serif;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
            min-height:100vh;
            overflow:hidden;
            position:relative;
        }
        body::before{
            content:'';
            position:fixed;
            top:0;left:0;right:0;bottom:0;
            background:radial-gradient(circle at 20% 80%,rgba(120,119,198,0.3) 0%,transparent 50%),
                        radial-gradient(circle at 80% 20%,rgba(255,119,198,0.3) 0%,transparent 50%),
                        radial-gradient(circle at 40% 40%,rgba(120,219,255,0.3) 0%,transparent 50%);
            pointer-events:none;
            z-index:-1;
            animation:backgroundShift 20s ease infinite;
        }
        @keyframes backgroundShift{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

        .container{
            max-width:1400px;margin:0 auto;padding:20px;height:100vh;
            display:flex;flex-direction:column;
            position:relative;
        }

        /* Header */
        .header{
            text-align:center;padding:30px 0;
            position:relative;z-index:10;
        }
        .logo{
            display:flex;align-items:center;justify-content:center;gap:20px;
            margin-bottom:15px;
        }
        .logo-circle{
            width:80px;height:80px;
            background:linear-gradient(135deg,#ff6b6b,#ee5a52);
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:32px;color:white;
            box-shadow:0 20px 40px rgba(255,107,107,0.4);
            animation:pulse 2s infinite;
        }
        @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
        h1{
            font-size:clamp(2.8rem,6vw,5rem);
            font-weight:800;
            background:linear-gradient(135deg,#fff,#f0f0f0);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            text-shadow:0 4px 20px rgba(0,0,0,0.3);
        }
        .tagline{
            font-size:1.4rem;color:rgba(255,255,255,0.9);
            font-weight:400;margin-top:10px;
            letter-spacing:1px;
        }

        /* Controls */
        .controls{
            display:flex;justify-content:center;gap:20px;
            flex-wrap:wrap;padding:20px 0;
            position:relative;z-index:10;
        }
        .btn{
            padding:16px 32px;
            border:none;border-radius:50px;
            font-size:16px;font-weight:600;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            position:relative;overflow:hidden;
            backdrop-filter:blur(20px);
        }
        .btn-primary{
            background:linear-gradient(135deg,#ff6b6b,#ee5a52);
            color:white;
        }
        .btn-secondary{
            background:rgba(255,255,255,0.15);
            color:white;
            border:2px solid rgba(255,255,255,0.3);
        }
        .btn:hover{transform:translateY(-5px) scale(1.05);}
        .btn.active{box-shadow:0 0 0 0 rgba(255,107,107,1);animation:glow 1.5s infinite;}
        @keyframes glow{0%{box-shadow:0 0 0 0 rgba(255,107,107,0.7);}70%{box-shadow:0 0 0 20px rgba(255,107,107,0);}100%{box-shadow:0 0 0 0 rgba(255,107,107,0);}}

        /* Canvas Area */
        .sketch-area{
            flex:1;
            display:flex;
            gap:30px;
            align-items:center;
            justify-content:center;
            position:relative;
            min-height:500px;
        }
        .canvas-container{
            position:relative;
            width:600px;height:500px;
            border-radius:30px;
            overflow:hidden;
            box-shadow:0 30px 80px rgba(0,0,0,0.4);
            backdrop-filter:blur(30px);
            border:2px solid rgba(255,255,255,0.2);
        }
        #sketchCanvas{
            width:100%;height:100%;
            border-radius:28px;
            cursor:crosshair;
            touch-action:none;
            background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));
        }

        /* Trail Effect */
        .particle{
            position:absolute;
            width:6px;height:6px;
            background:#ff6b6b;
            border-radius:50%;
            pointer-events:none;
            animation:particleFade 1s ease-out forwards;
            z-index:100;
        }
        @keyframes particleFade{
            0%{transform:scale(1) translateY(0);opacity:1;}
            100%{transform:scale(0) translateY(-20px);opacity:0;}
        }

        /* AI Magic Panel */
        .ai-panel{
            width:350px;height:500px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(25px);
            border-radius:25px;
            padding:30px;
            border:2px solid rgba(255,255,255,0.15);
            box-shadow:0 20px 60px rgba(0,0,0,0.3);
            overflow:hidden;
        }
        .ai-title{
            font-size:1.6rem;font-weight:700;
            background:linear-gradient(135deg,#ff6b6b,#ee5a52);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            margin-bottom:20px;
            text-align:center;
        }
        .sketch-stats{
            display:flex;justify-content:space-between;
            margin-bottom:25px;
            font-size:14px;color:rgba(255,255,255,0.8);
        }
        .ai-response{
            height:280px;
            background:rgba(0,0,0,0.3);
            border-radius:20px;
            padding:20px;
            overflow-y:auto;
            font-size:15px;line-height:1.6;
            border:1px solid rgba(255,255,255,0.1);
            white-space:pre-wrap;
        }
        .magic-btn{
            width:100%;padding:15px;
            background:linear-gradient(135deg,#ff6b6b,#ee5a52);
            color:white;border:none;
            border-radius:25px;
            font-size:16px;font-weight:600;
            cursor:pointer;
            margin-top:15px;
            transition:all 0.3s ease;
        }
        .magic-btn:hover{transform:translateY(-2px);box-shadow:0 15px 35px rgba(255,107,107,0.5);}

        /* Status */
        .status-bar{
            position:absolute;
            bottom:20px;left:50%;
            transform:translateX(-50%);
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(20px);
            padding:12px 25px;
            border-radius:30px;
            font-size:14px;
            border:1px solid rgba(255,255,255,0.2);
        }

        /* Responsive */
        @media (max-width:1000px){
            .sketch-area{flex-direction:column;gap:20px;}
            .ai-panel{width:90vw;max-width:500px;}
            .canvas-container{width:90vw;max-width:600px;height:400px;}
        }
        @media (max-width:768px){
            .controls{flex-direction:column;}
            .btn{width:250px;}
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-circle">✨</div>
                <h1>AirSketch</h1>
            </div>
            <p class="tagline">Draw in Air • AI Magic • Create Art</p>
        </header>

        <div class="controls">
            <button class="btn btn-primary active" onclick="sketch.startDrawing()">🎨 Start Drawing</button>
            <button class="btn btn-secondary" onclick="sketch.clearCanvas()">🗑️ Clear Canvas</button>
            <button class="btn btn-secondary" onclick="sketch.aiMagic()">✨ AI Magic</button>
            <button class="btn btn-secondary" onclick="sketch.downloadImage()">💾 Download</button>
        </div>

        <div class="sketch-area">
            <div class="canvas-container">
                <canvas id="sketchCanvas"></canvas>
            </div>
            <div class="ai-panel">
                <div class="ai-title">🤖 AI Sketch Analyzer</div>
                <div class="sketch-stats">
                    <span>🎨 Strokes: <span id="strokeCount">0</span></span>
                    <span>⚡ Speed: <span id="speedValue">0</span> px/s</span>
                    <span>🎯 Precision: <span id="precisionValue">100</span>%</span>
                </div>
                <div class="ai-response" id="aiResponse">
                    Draw something amazing!<br>
                    AI will analyze your air gestures<br>
                    and create magic ✨
                </div>
                <button class="magic-btn" onclick="sketch.aiMagic()">Generate AI Art</button>
            </div>
        </div>

        <div class="status-bar" id="statusBar">
            Move mouse to draw in air! 👆✨
        </div>
    </div>

    <script>
        const sketch = {
            canvas: document.getElementById('sketchCanvas'),
            ctx: null,
            isDrawing: false,
            lastPos: {x:0,y:0},
            strokeCount: 0,
            particles: [],
            startTime: 0,
            
            init() {
                this.canvas.width = 600;
                this.canvas.height = 500;
                this.ctx = this.canvas.getContext('2d');
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.ctx.shadowBlur = 20;
                this.ctx.shadowColor = 'rgba(255,255,255,0.5)';
                
                // Mouse events
                this.canvas.onmousedown = (e) => this.startDraw(e);
                this.canvas.onmousemove = (e) => this.draw(e);
                this.canvas.onmouseup = () => this.stopDraw();
                this.canvas.onmouseout = () => this.stopDraw();
                
                // Touch events
                this.canvas.ontouchstart = (e) => {
                    e.preventDefault();
                    this.startDraw(e.touches[0]);
                };
                this.canvas.ontouchmove = (e) => {
                    e.preventDefault();
                    this.draw(e.touches[0]);
                };
                this.canvas.ontouchend = () => this.stopDraw();
                
                this.updateStats();
            },
            
            startDraw(e) {
                this.isDrawing = true;
                const rect = this.canvas.getBoundingClientRect();
                this.lastPos = {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
                this.ctx.beginPath();
                this.ctx.moveTo(this.lastPos.x, this.lastPos.y);
                this.startTime = Date.now();
                document.getElementById('statusBar').textContent = 'Drawing... ✨';
            },
            
            draw(e) {
                if (!this.isDrawing) return;
                
                const rect = this.canvas.getBoundingClientRect();
                const pos = {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
                
                // Dynamic trail color
                const hue = (Date.now() * 0.01 + pos.x) % 360;
                this.ctx.strokeStyle = `hsla(${hue}, 80%, 65%, 0.9)`;
                this.ctx.lineWidth = 8 + Math.sin(Date.now() * 0.01) * 3;
                
                this.ctx.lineTo(pos.x, pos.y);
                this.ctx.stroke();
                
                // Particles
                this.createParticle(pos.x, pos.y);
                
                this.lastPos = pos;
                this.strokeCount++;
                document.getElementById('strokeCount').textContent = this.strokeCount;
            },
            
            stopDraw() {
                if (this.isDrawing) {
                    this.isDrawing = false;
                    const speed = ((Date.now() - this.startTime) / 1000) || 1;
                    document.getElementById('speedValue').textContent = (120 / speed).toFixed(0);
                    document.getElementById('statusBar').textContent = '✨ AirSketch complete! Try AI Magic!';
                }
            },
            
            createParticle(x, y) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = `hsl(${(Date.now()*0.01)%360},80%,60%)`;
                document.querySelector('.canvas-container').appendChild(particle);
                
                setTimeout(() => particle.remove(), 1000);
            },
            
            clearCanvas() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.strokeCount = 0;
                document.getElementById('strokeCount').textContent = '0';
                document.getElementById('aiResponse').textContent = 'Canvas cleared! 🎨 Draw something new!';
                document.getElementById('statusBar').textContent = 'Ready to draw! 👆';
            },
            
            aiMagic() {
                const responses = [
                    `🎨 **AI ANALYSIS COMPLETE!** ✨\n\nYour air sketch is:\n• Strokes: ${this.strokeCount}\n• Style: Abstract Modern 🎪\n• Mood: Dynamic & Energetic 🔥\n• Influences: Kandinsky + Digital Art\n\n✨ Converting to professional artwork...\n✅ Magic complete!`,
                    
                    `🤖 **SKETCH ENHANCED!** 🎇\n\nAI detected:\n• ${this.strokeCount} gesture strokes\n• High creativity score: 92%\n• Perfect air-drawing technique!\n\n🎨 Generated variations:\n1. Neon Cyberpunk\n2. Watercolor Dream\n3. Geometric Abstract\n\nDownload your masterpiece! 🌟`,
                    
                    `✨ **AIR TO ART TRANSFORMED!** 🎨\n\nMasterpiece analysis:\n• Technique: Expert level\n• Originality: 89%\n• Energy: Explosive!\n\nAI applied:\n• Neural style transfer\n• Color harmony\n• Professional finishing\n\nYour art is gallery-ready! 🖼️`
                ];
                
                document.getElementById('aiResponse').textContent = responses[Math.floor(Math.random()*3)];
            },
            
            downloadImage() {
                const link = document.createElement('a');
                link.download = `AirSketch-${Date.now()}.png`;
                link.href = this.canvas.toDataURL();
                link.click();
                document.getElementById('statusBar').textContent = 'Art downloaded! 🎉 Share your creation!';
            },
            
            updateStats() {
                // Animated stats
                setInterval(() => {
                    const precision = 85 + Math.sin(Date.now() * 0.002) * 10;
                    document.getElementById('precisionValue').textContent = Math.round(precision);
                }, 100);
            }
        };

        // Initialize
        window.sketch = sketch;
        sketch.init();

        // Button handlers
        function startDrawing() {
            document.querySelector('.btn-primary').classList.add('active');
            sketch.canvas.style.cursor = 'crosshair';
        }

        // Auto-start drawing mode
        document.querySelector('.btn-primary').click();
    </script>
</body>
</html>
